<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckPassword 테스트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .test-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .test-panel {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .test-panel h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-test {
            background: #667eea;
            color: white;
        }

        .btn-test:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-clear {
            background: #e74c3c;
            color: white;
        }

        .btn-clear:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .btn-small {
            flex: none;
            padding: 8px 12px;
            font-size: 12px;
            background: #f39c12;
            color: white;
        }

        .btn-small:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4);
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-weight: 600;
            display: none;
            font-size: 15px;
        }

        .result-box.success {
            background: #d5f4e6;
            color: #27ae60;
            border: 1px solid #27ae60;
            display: block;
        }

        .result-box.failure {
            background: #fadbd8;
            color: #e74c3c;
            border: 1px solid #e74c3c;
            display: block;
        }

        .test-cases {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .test-cases h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .test-case-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }

        .test-case-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .test-case-info {
            font-size: 14px;
            color: #666;
        }

        .test-case-info strong {
            color: #333;
        }

        .test-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
        }

        .test-status.pass {
            background: #d5f4e6;
            color: #27ae60;
        }

        .test-status.fail {
            background: #fadbd8;
            color: #e74c3c;
        }

        .test-status.pending {
            background: #fef5e7;
            color: #f39c12;
        }

        .btn-run-all {
            background: #27ae60;
            color: white;
            padding: 12px 20px;
            font-size: 15px;
            width: 100%;
            margin-top: 15px;
        }

        .btn-run-all:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .test-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 CheckPassword 테스트</h1>

        <!-- 수동 테스트 -->
        <div class="test-grid">
            <!-- 개별 테스트 -->
            <div class="test-panel">
                <h2>개별 테스트</h2>
                <div class="form-group">
                    <label for="testUserId">테스트 아이디:</label>
                    <select id="testUserId">
                        <option value="">선택하세요</option>
                        <option value="admin">admin</option>
                        <option value="user">user</option>
                        <option value="test">test</option>
                        <option value="invalid">invalid</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="testPassword">테스트 비밀번호:</label>
                    <select id="testPassword">
                        <option value="">선택하세요</option>
                        <option value="password123">password123</option>
                        <option value="user1234">user1234</option>
                        <option value="test1234">test1234</option>
                        <option value="wrongpass">wrongpass</option>
                    </select>
                </div>

                <div class="button-group">
                    <button class="btn-test" onclick="runSingleTest()">테스트 실행</button>
                    <button class="btn-clear" onclick="clearSingleTest()">초기화</button>
                </div>

                <div id="singleTestResult" class="result-box"></div>
            </div>

            <!-- 커스텀 입력 테스트 -->
            <div class="test-panel">
                <h2>커스텀 입력 테스트</h2>
                <div class="form-group">
                    <label for="customUserId">아이디:</label>
                    <input type="text" id="customUserId" placeholder="아이디 입력">
                </div>

                <div class="form-group">
                    <label for="customPassword">비밀번호:</label>
                    <input type="password" id="customPassword" placeholder="비밀번호 입력">
                </div>

                <div class="button-group">
                    <button class="btn-test" onclick="runCustomTest()">테스트 실행</button>
                    <button class="btn-clear" onclick="clearCustomTest()">초기화</button>
                </div>

                <div id="customTestResult" class="result-box"></div>
            </div>
        </div>

        <!-- 자동 테스트 케이스 -->
        <div class="test-cases">
            <h2>자동 테스트 케이스</h2>
            <div id="testCaseList"></div>
            <button class="btn-run-all" onclick="runAllTests()">🚀 모든 테스트 실행</button>
            
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-number" id="passCount">0</div>
                    <div class="stat-label">성공</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="failCount">0</div>
                    <div class="stat-label">실패</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">총 테스트</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 샘플 사용자 계정
        const validUsers = {
            'admin': 'password123',
            'user': 'user1234',
            'test': 'test1234'
        };

        // 비밀번호 검증 함수
        function checkPassword(userId, password) {
            if (!(userId in validUsers)) {
                return false;
            }
            if (validUsers[userId] === password) {
                return true;
            }
            return false;
        }

        // 테스트 케이스 정의
        const testCases = [
            { id: 1, userId: 'admin', password: 'password123', expected: true, description: '정상 로그인 - admin' },
            { id: 2, userId: 'user', password: 'user1234', expected: true, description: '정상 로그인 - user' },
            { id: 3, userId: 'test', password: 'test1234', expected: true, description: '정상 로그인 - test' },
            { id: 4, userId: 'admin', password: 'wrongpass', expected: false, description: '잘못된 비밀번호' },
            { id: 5, userId: 'invaliduser', password: 'password123', expected: false, description: '존재하지 않는 아이디' },
            { id: 6, userId: '', password: '', expected: false, description: '빈 입력' },
            { id: 7, userId: 'admin', password: '', expected: false, description: '비밀번호 없음' },
            { id: 8, userId: '', password: 'password123', expected: false, description: '아이디 없음' },
            { id: 9, userId: 'ADMIN', password: 'password123', expected: false, description: '대소문자 구별' },
            { id: 10, userId: 'user', password: 'USER1234', expected: false, description: '비밀번호 대소문자 구별' }
        ];

        // 초기화 - 테스트 케이스 목록 렌더링
        function initTestCases() {
            const listDiv = document.getElementById('testCaseList');
            listDiv.innerHTML = testCases.map(tc => `
                <div class="test-case-item" id="tc-${tc.id}">
                    <div class="test-case-header">
                        <div class="test-case-info">
                            <strong>#${tc.id}:</strong> ${tc.description}
                        </div>
                        <span class="test-status pending">대기</span>
                    </div>
                    <div class="test-case-info" style="font-size: 13px;">
                        입력: <code>${tc.userId}</code> / <code>${tc.password}</code> | 예상: <strong>${tc.expected ? '✓ 성공' : '✗ 실패'}</strong>
                    </div>
                </div>
            `).join('');
            document.getElementById('totalCount').textContent = testCases.length;
        }

        // 개별 테스트 실행
        function runSingleTest() {
            const userId = document.getElementById('testUserId').value;
            const password = document.getElementById('testPassword').value;
            const resultDiv = document.getElementById('singleTestResult');

            if (!userId || !password) {
                resultDiv.className = 'result-box failure';
                resultDiv.textContent = '⚠️ 아이디와 비밀번호를 선택하세요';
                return;
            }

            const result = checkPassword(userId, password);
            resultDiv.className = 'result-box ' + (result ? 'success' : 'failure');
            resultDiv.textContent = result 
                ? `✓ 로그인 성공: ${userId}` 
                : `✗ 로그인 실패: 아이디 또는 비밀번호가 잘못되었습니다`;
        }

        // 개별 테스트 초기화
        function clearSingleTest() {
            document.getElementById('testUserId').value = '';
            document.getElementById('testPassword').value = '';
            document.getElementById('singleTestResult').className = 'result-box';
            document.getElementById('singleTestResult').textContent = '';
        }

        // 커스텀 테스트 실행
        function runCustomTest() {
            const userId = document.getElementById('customUserId').value;
            const password = document.getElementById('customPassword').value;
            const resultDiv = document.getElementById('customTestResult');

            if (userId === '' || password === '') {
                resultDiv.className = 'result-box failure';
                resultDiv.textContent = '⚠️ 아이디와 비밀번호를 입력하세요';
                return;
            }

            const result = checkPassword(userId, password);
            resultDiv.className = 'result-box ' + (result ? 'success' : 'failure');
            resultDiv.textContent = result 
                ? `✓ 로그인 성공: ${userId}` 
                : `✗ 로그인 실패: 아이디 또는 비밀번호가 잘못되었습니다`;
        }

        // 커스텀 테스트 초기화
        function clearCustomTest() {
            document.getElementById('customUserId').value = '';
            document.getElementById('customPassword').value = '';
            document.getElementById('customTestResult').className = 'result-box';
            document.getElementById('customTestResult').textContent = '';
        }

        // 모든 테스트 실행
        async function runAllTests() {
            let passCount = 0;
            let failCount = 0;

            for (const tc of testCases) {
                const result = checkPassword(tc.userId, tc.password);
                const passed = result === tc.expected;

                const tcElement = document.getElementById(`tc-${tc.id}`);
                const statusElement = tcElement.querySelector('.test-status');

                if (passed) {
                    statusElement.className = 'test-status pass';
                    statusElement.textContent = '✓ 통과';
                    passCount++;
                } else {
                    statusElement.className = 'test-status fail';
                    statusElement.textContent = '✗ 실패';
                    failCount++;
                }

                // 애니메이션 효과
                await new Promise(resolve => setTimeout(resolve, 300));
            }

            document.getElementById('passCount').textContent = passCount;
            document.getElementById('failCount').textContent = failCount;
        }

        // 페이지 로드 시 초기화
        window.addEventListener('DOMContentLoaded', initTestCases);

        // 콘솔에 귀중한 정보 출력
        console.log('=== CheckPassword 테스트 시스템 ===');
        console.log('검증 함수:', checkPassword);
        console.log('테스트 계정:', validUsers);
        console.log('테스트 케이스:', testCases);
    </script>
</body>
</html>
