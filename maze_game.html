<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미로 찾기 게임</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            border-left: 3px solid #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #667eea;
            font-size: 24px;
            font-weight: 700;
        }

        .difficulty-selector {
            margin-bottom: 20px;
        }

        .difficulty-label {
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
        }

        .difficulty-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-difficulty {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: #666;
        }

        .btn-difficulty:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .btn-difficulty.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .game-area {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        canvas {
            border: 2px solid #667eea;
            background: white;
            display: block;
            cursor: none;
            image-rendering: pixelated;
        }

        .controls {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .control-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .control-keys {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .key {
            background: white;
            border: 2px solid #ddd;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: 600;
            color: #333;
            min-width: 40px;
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-start {
            background: #27ae60;
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
        }

        .btn-restart {
            background: #3498db;
            color: white;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 5px;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
            font-size: 16px;
        }

        .message.success {
            background: #d5f4e6;
            color: #27ae60;
            border: 2px solid #27ae60;
            display: block;
        }

        .message.info {
            background: #d6eaf8;
            color: #3498db;
            border: 2px solid #3498db;
            display: block;
        }

        .legend {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }

        .legend-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .legend-symbol {
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-right: 10px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .wall {
            background: #333;
        }

        .player {
            background: #f39c12;
        }

        .goal {
            background: #e74c3c;
        }

        .path {
            background: white;
            border: 1px solid #ddd;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 미로 찾기 게임</h1>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">시간</div>
                <div class="stat-value" id="time">0초</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">이동</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">난이도</div>
                <div class="stat-value" id="difficulty">쉬움</div>
            </div>
        </div>

        <div id="message" class="message"></div>

        <div class="difficulty-selector">
            <label class="difficulty-label">난이도 선택:</label>
            <div class="difficulty-buttons">
                <button class="btn-difficulty active" onclick="setDifficulty('easy')">쉬움</button>
                <button class="btn-difficulty" onclick="setDifficulty('medium')">보통</button>
                <button class="btn-difficulty" onclick="setDifficulty('hard')">어려움</button>
            </div>
        </div>

        <div class="controls">
            <div class="control-title">🎮 조작 방법</div>
            <div class="control-keys">
                <span class="key">↑</span>
                <span class="key">↓</span>
                <span class="key">←</span>
                <span class="key">→</span>
                <span>또는</span>
                <span class="key">W</span>
                <span class="key">A</span>
                <span class="key">S</span>
                <span class="key">D</span>
            </div>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div class="button-group">
            <button class="btn-start" onclick="startGame()">🚀 게임 시작</button>
            <button class="btn-restart" onclick="resetGame()">🔄 초기화</button>
        </div>

        <div class="legend">
            <div class="legend-title">범례</div>
            <div class="legend-item">
                <div class="legend-symbol wall"></div>
                <span>벽 (지나갈 수 없음)</span>
            </div>
            <div class="legend-item">
                <div class="legend-symbol player"></div>
                <span>플레이어 (노란색)</span>
            </div>
            <div class="legend-item">
                <div class="legend-symbol goal"></div>
                <span>목표/출구 (빨간색)</span>
            </div>
            <div class="legend-item">
                <div class="legend-symbol path"></div>
                <span>길 (이동 가능)</span>
            </div>
        </div>
    </div>

    <script src="maze_game.js"></script>
</body>
</html>
